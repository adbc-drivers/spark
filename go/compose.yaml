services:
  kerberos:
    build:
      context: ./ci/docker/kerberos/
      dockerfile: Dockerfile
      target: kerberos
    environment:
      REALM: KDC.LOCAL
      KADMIN_PRINCIPAL: kadmin/admin
      KADMIN_PASSWORD: password
    volumes:
      - ./data/kerberos/keytabs:/var/keytabs
      - /dev/urandom:/dev/random
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep 88 | grep LISTEN || exit 1"]
      retries: 10

  # Metastore DB (PostgreSQL for Hive Metastore)
  metastore-db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    ports:
      - "5434:5432"
    volumes:
      - ./data/metastore:/var/lib/postgresql
      - ./ci/docker/hive/conf:/opt/hive/conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Hive Metastore (catalog backend for Iceberg)
  hive-metastore:
    build:
      context: ./ci/docker/
      dockerfile: hive/Dockerfile
      target: hive
    depends_on:
      metastore-db:
        condition: service_healthy
      kerberos:
        condition: service_healthy
    environment:
      IS_RESUME: true
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      KRB5CCNAME: /tmp/krb5cc_hive
    ports:
      - "9083:9083"  # Hive Metastore Thrift
    volumes:
      - ./data/metastore:/opt/spark-data
      - ./data/kerberos/keytabs:/var/keytabs
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep 9083 | grep LISTEN || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  spark-master:
    image: apache/spark:3.5.0
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master Port
    command: "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"

  spark-worker:
    image: apache/spark:3.5.0
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_NO_DAEMONIZE: true
    healthcheck:
      test: curl --fail http://localhost:8081
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

  spark-thrift-server:
    build:
      context: ./ci/docker/
      dockerfile: spark/Dockerfile
      target: thrift
    depends_on:
      spark-master:
        condition: service_started
      hive-metastore:
        condition: service_healthy
      kerberos:
        condition: service_healthy
    environment:
      SPARK_MASTER: spark://spark-master:7077
      KRB5CCNAME: /tmp/krb5cc_spark
    ports:
      - "10000:10000"  # Thrift JDBC/ODBC port
      # - "10001:10001"  # Thrift HTTP port
      - "4040:4040"    # Spark UI for Thrift Server
    volumes:
      - ./ci/docker/spark/conf/:/opt/spark/conf/:ro
      - ./data/kerberos/keytabs:/var/keytabs
      - ./data/metastore:/opt/spark-data
    healthcheck:
      test: ["CMD-SHELL", "klist && netstat -an | grep 10000 | grep LISTEN || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # Apache Livy Server with Iceberg support
  livy:
    build:
      context: ./ci/docker/
      dockerfile: spark/Dockerfile
      target: livy
    depends_on:
      spark-master:
        condition: service_started
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8998:8998"  # Livy REST API
    volumes:
      - ./ci/docker/spark/conf/:/opt/livy/conf/:ro
      - ./data/metastore:/opt/spark-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8998/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
