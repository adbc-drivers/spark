services:
  # Metastore DB (PostgreSQL for Hive Metastore)
  metastore-db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    ports:
      - "5434:5432"
    volumes:
      - ./data/metastore:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Hive Metastore (catalog backend for Iceberg)
  hive-metastore:
    build:
      context: ./ci/docker/
      dockerfile: hive.dockerfile
      target: hive
    depends_on:
      metastore-db:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dhive.metastore.warehouse.dir=/opt/spark-data/warehouse
        -Dhive.server2.authentication=NOSASL
    ports:
      - "9083:9083"  # Hive Metastore Thrift 
    volumes:
      - ./data:/opt/spark-data
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'org.apache.hadoop.hive.metastore.HiveMetaStore' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s


  spark-master:
    image: apache/spark:3.5.0
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
    ports:
      - "8080:8080"   # Spark Master Web UI 
      - "7077:7077"   # Spark Master Port 
    command: "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"

  spark-worker:
    image: apache/spark:3.5.0
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_started
    environment:
      SPARK_NO_DAEMONIZE: true
    healthcheck:
      test: curl --fail http://localhost:8081
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s
  
  spark-thrift-server:
    build:
      context: ./ci/docker/
      dockerfile: spark.dockerfile
      target: thrift
    depends_on:
      spark-master:
        condition: service_started
      hive-metastore:
        condition: service_healthy
    environment:
      SPARK_MASTER: spark://spark-master:7077
    ports:
      - "10000:10000"  # Thrift JDBC/ODBC port
      # - "10001:10001"  # Thrift HTTP port
      - "4040:4040"    # Spark UI for Thrift Server
    volumes:
      - ./ci/docker/conf/:/opt/spark/conf/:ro
      - ./data:/opt/spark-data
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep 10000 | grep LISTEN || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


  # Apache Livy Server with Iceberg support
  livy:
    build:
      context: ./ci/docker
      dockerfile: spark.dockerfile
      target: livy
    depends_on:
      spark-master:
        condition: service_started
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8998:8998"  # Livy REST API
    volumes:
      - ./ci/docker/conf/:/opt/livy/conf/:ro
      - ./data:/opt/spark-data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8998/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
