services:
  spark-master:
    image: apache/spark:latest
    command: ["/bin/bash", "-c", "/opt/spark/sbin/start-master.sh; env SPARK_NO_DAEMONIZE=true /opt/spark/sbin/start-thriftserver.sh --conf spark.hadoop.hive.server2.transport.mode=http --conf spark.hadoop.hive.server2.authentication=NOSASL"]
    # environment:
    #   SPARK_NO_DAEMONIZE: "true"
    healthcheck:
      # test: "bash -c 'exec 6<> /dev/tcp/localhost/10000'"
      test: curl --fail http://localhost:10001
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    ports:
      - 7077:7077
      - 8080:8080
      - 10000:10000
      - 10001:10001

  test-service:
    image: apache/spark:latest
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
        restart: true
    environment:
      SPARK_NO_DAEMONIZE: "true"
    healthcheck:
      test: curl --fail http://localhost:8081
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
