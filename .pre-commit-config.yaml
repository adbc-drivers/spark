repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: d1b833175a5d08a925900115526febd8fe71c98e  # frozen: v0.15.11
  hooks:
    - id: ruff-check
      name: "ruff check (isort)"
      args: ["--select", "I", "--fix"]
    - id: ruff-check
      args: ["--fix"]
    - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
  hooks:
  - id: codespell
    exclude: >
        (?x)^(
            .*go\.sum|
            go/hiveserver2\.thrift|
            go/connectclient/internal/generated/.*\.go
        )$

- repo: https://github.com/golangci/golangci-lint
  rev: 8f3b0c7ed018e57905fbd873c697e0b1ede605a5  # frozen: v2.11.4
  hooks:
  - id: golangci-lint
    entry: bash -c 'cd go && golangci-lint run --fix --timeout 5m'
    types_or: [go, go-mod]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-executables-have-shebangs
  - id: check-yaml
  - id: detect-private-key
  - id: end-of-file-fixer
  - id: mixed-line-ending
    args: [--fix=lf]
    exclude: '\.bat$'
  - id: trailing-whitespace

- repo: https://github.com/adbc-drivers/dev
  rev: 1db71945aa67ad813214862eb9cfc891b99981ea
  hooks:
  - id: rat

- repo: local
  hooks:
  - id: gofix
    name: go fix
    language: system
    types: [go]
    entry: bash -c 'cd go && go fix ./...'
    pass_filenames: false
