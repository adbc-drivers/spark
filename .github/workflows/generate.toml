driver = "spark"
repository = "apache"

[aws]
region = "us-east-1"

[lang.go.test]
service-name = "spark4-thrift-server"

[[lang.go.validation.configs]]
service_name = "spark35-thrift-server"
vendor_version = "spark3_3.5-thrift"

[[lang.go.validation.configs]]
service_name = "spark35-livy"
vendor_version = "spark3_3.5-livy"

[[lang.go.validation.configs]]
service_name = "spark4-thrift-server"
vendor_version = "spark4_4.0-thrift"

[[lang.go.validation.configs]]
service_name = "spark4-thrifthttp-server"
vendor_version = "spark4_4.0-thrifthttp"

[[lang.go.validation.configs]]
service_name = "spark4-connect-server"
vendor_version = "spark4_4.0-connect"

[[lang.go.validation.configs]]
service_name = "spark41-connect-server"
vendor_version = "spark4_4.1-connect"

[[lang.go.validation.configs]]
service_name = "spark41-connect-server"
vendor_version = "spark4iceberg_4.1-connect"

[[lang.go.validation.configs]]
service_name = ""
vendor_version = "emr_8.0-connect"
aws = true
environment = "aws-emr-serverless"

[secrets]
EMR_SERVERLESS_APPLICATION_ID = { secret = "EMR_SERVERLESS_APPLICATION_ID", contexts = ["validate"] }
EMR_SERVERLESS_EXECUTION_ROLE_ARN = { secret = "EMR_SERVERLESS_EXECUTION_ROLE_ARN", contexts = ["validate"] }
STAGING_S3_BUCKET = { secret = "STAGING_S3_BUCKET", contexts = ["validate"] }
